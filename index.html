<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FUTA CBT APP</title>
    <style>
        button {
            touch-action: manipulation;
        }

        button:active {
            background-color: #ccc; /* Example of enhancing button active states */
        }

        .q-dot {
            width: 16px; /* Increase size of q-dot on mobile */
            height: 16px;
        }

        .modal {
            pointer-events: none; /* Optimize modal pointer-events */
        }
    </style>
</head>
<body>
    <button id="myButton">Click me!</button>
    <div class="q-dot"></div>
    <script>
        // Debounce function for chooseOpt
        function debounce(func, delay) {
            let timeoutId;
            return function(...args) {
                if (timeoutId) {
                    clearTimeout(timeoutId);
                }
                timeoutId = setTimeout(() => {
                    func.apply(this, args);
                }, delay);
            };
        }

        // Setting passive event listeners
        window.addEventListener('scroll', function() {
            // Optimization logic here
        }, { passive: true });

        // Auto-scroll inputs on focus
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                input.scrollIntoView({ behavior: 'smooth', block: 'center' });
            });
        });

        // Disable iOS zoom on inputs
        document.querySelectorAll('input').forEach(input => {
            input.setAttribute('style', 'font-size: 16px;'); // Prevent zoom
        });

        // Reduce sidebar transition time
        document.querySelector('.sidebar').style.transition = '0.2s'; // Example transition time

        // Using requestAnimationFrame for timer updates
        function updateTimer() {
            // Timer update logic here
            requestAnimationFrame(updateTimer);
        }
        requestAnimationFrame(updateTimer);
    </script>
</body>
</html>
