<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBT Application</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .interactive {
            cursor: pointer;
            user-select: none;
        }
    </style>
</head>
<body>
    <header>
        <h1>Computer-Based Test Application</h1>
    </header>
    <main>
        <div id="options" class="interactive">
            <button data-index="0">Option A</button>
            <button data-index="1">Option B</button>
            <button data-index="2">Option C</button>
            <button data-index="3">Option D</button>
        </div>
        <div id="questions">
            <div class="question-dot interactive" data-index="0">1</div>
            <div class="question-dot interactive" data-index="1">2</div>
            <div class="question-dot interactive" data-index="2">3</div>
        </div>
    </main>
    <script>
        // Centralized ExamState
        const ExamState = {
            currentQuestion: 0,
            selectedOption: null,
            setCurrentQuestion(index) {
                this.currentQuestion = index;
            },
            selectOption(index) {
                this.selectedOption = index;
            }
        };

        // Event delegation for options
        document.getElementById('options').addEventListener('click', function(e) {
            if (e.target.matches('button')) {
                const index = e.target.getAttribute('data-index');
                ExamState.selectOption(index);
                console.log(`Selected Option: ${index}`);
            }
        });

        // Unsafe navigation guard
        document.getElementById('questions').addEventListener('click', function(e) {
            if (e.target.matches('.question-dot')) {
                if (confirm('Are you sure you want to navigate to the next question?')) {
                    const index = e.target.getAttribute('data-index');
                    ExamState.setCurrentQuestion(index);
                    console.log(`Navigated to Question: ${index}`);
                }
            }
        });
    </script>
</body>
</html>
